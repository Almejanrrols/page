<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Hub de Accesos Directos</title>
    <style>
        /* CSS: Estilos base */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            /* Permite scroll horizontal si la cuadrícula crece mucho */
            overflow-x: auto; 
        }

        /* La cuadrícula tipo Windows 8 con tamaño fijo para mantener el formato */
        .hub-grid {
            display: grid;
            /* Columnas y filas fijas de 140px. El grid crecerá según las coordenadas */
            grid-auto-columns: 140px;
            grid-auto-rows: 140px;
            gap: 15px;
            /* Si un elemento no tiene 'order:', rellenará los huecos automáticamente */
            grid-auto-flow: row dense; 
        }

        /* Estilo de cada "Tile" (cuadrado) */
        .tile {
            background-color: #0078D7;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s ease;
            box-sizing: border-box;
            width: 100%;
            height: 100%;
        }

        .tile:hover {
            transform: scale(1.1);
            background-color: #005A9E;
            z-index: 10;
        }

        .tile img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .tile span {
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
        }

        #mensaje {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="hub-grid" id="hub">
        <div id="mensaje">Cargando accesos directos...</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Promise.allSettled nos permite intentar cargar ambos archivos sin que uno bloquee al otro si falta
            Promise.allSettled([
                fetch('pages.ini').then(res => res.ok ? res.text() : Promise.reject('No pages.ini')),
                fetch('pages_64.ini').then(res => res.ok ? res.text() : Promise.reject('No pages_64.ini'))
            ]).then(results => {
                let todasLasPaginas = [];

                // Procesamos pages.ini (Normal)
                if (results[0].status === 'fulfilled') {
                    todasLasPaginas = todasLasPaginas.concat(parseCustomINI(results[0].value, false));
                }

                // Procesamos pages_64.ini (Base64)
                if (results[1].status === 'fulfilled') {
                    todasLasPaginas = todasLasPaginas.concat(parseCustomINI(results[1].value, true));
                }

                if (todasLasPaginas.length === 0) {
                    document.getElementById('mensaje').innerText = 'No se encontraron accesos directos o no hay servidor local activo.';
                    return;
                }

                renderHub(todasLasPaginas);
            });
        });

        // Función para parsear el .ini, con soporte para Base64
        function parseCustomINI(text, isBase64) {
            const lines = text.split('\n');
            const pages = [];
            let currentPage = {};

            lines.forEach(line => {
                line = line.trim();
                
                if (line === '') {
                    if (Object.keys(currentPage).length > 0) {
                        pages.push(currentPage);
                        currentPage = {};
                    }
                    return;
                }

                const separatorIndex = line.indexOf(':');
                if (separatorIndex !== -1) {
                    const key = line.substring(0, separatorIndex).trim().toLowerCase();
                    let value = line.substring(separatorIndex + 1).trim();

                    // Si es el archivo 64 y la clave es URL, la decodificamos
                    if (isBase64 && key === 'url') {
                        try {
                            value = atob(value); // atob decodifica Base64 a texto normal
                        } catch (e) {
                            console.error('Error decodificando Base64:', value);
                            value = '#';
                        }
                    }
                    currentPage[key] = value;
                }
            });

            if (Object.keys(currentPage).length > 0) {
                pages.push(currentPage);
            }

            return pages;
        }

        // Traduce coordenadas como "1a" o "a1" a fila y columna numérica
        function parseGridOrder(orderStr) {
            if (!orderStr) return null;
            
            orderStr = orderStr.trim().toLowerCase();
            // Busca (letras)(numeros) o (numeros)(letras)
            const match = orderStr.match(/^([a-z]+)(\d+)$|^(\d+)([a-z]+)$/);
            if (!match) return null;

            const letters = match[1] || match[4];
            const numbers = match[2] || match[3];

            // Convierte las letras a un número de columna (a=1, b=2, c=3...)
            let col = 0;
            for (let i = 0; i < letters.length; i++) {
                col = col * 26 + (letters.charCodeAt(i) - 96);
            }
            
            const row = parseInt(numbers, 10);
            return { row, col };
        }

        // Dibuja los elementos en el HTML
        function renderHub(pages) {
            const hub = document.getElementById('hub');
            hub.innerHTML = ''; 

            pages.forEach(page => {
                const a = document.createElement('a');
                a.className = 'tile';
                a.target = '_blank';
                
                let url = page.url || '#';
                if (url !== '#' && !url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }
                a.href = url;

                // Asignar posición en la cuadrícula si existe el parámetro 'order'
                const gridPos = parseGridOrder(page.order);
                if (gridPos) {
                    // grid-area: fila-inicio / col-inicio / fila-fin / col-fin
                    a.style.gridArea = `${gridPos.row} / ${gridPos.col} / ${gridPos.row + 1} / ${gridPos.col + 1}`;
                }

                const img = document.createElement('img');
                img.src = page.icon || '';
                img.alt = page.name || 'Icono';
                img.onerror = () => { img.style.display = 'none'; };

                const span = document.createElement('span');
                span.textContent = page.name || 'Sin Nombre';

                a.appendChild(img);
                a.appendChild(span);
                hub.appendChild(a);
            });
        }
    </script>
</body>
</html>
