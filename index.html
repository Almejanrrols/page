<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almejanrrols Hub</title>
    <style>
        /* CSS: Estilos base */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: auto; 
        }

        /* La cuadrícula tipo Windows 8 */
        .hub-grid {
            display: grid;
            grid-auto-columns: 140px;
            grid-auto-rows: 140px;
            gap: 15px;
            grid-auto-flow: row dense; 
        }

        /* Estilo de cada "Tile" (cuadrado) */
        .tile {
            background-color: #0078D7;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease;
            box-sizing: border-box;
            width: 100%;
            height: 100%;
        }

        .tile:hover {
            transform: scale(1.1);
            filter: brightness(0.85);
            z-index: 10;
        }

        /* El tamaño por defecto si no se especifica img-size */
        .tile img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .tile span {
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
        }

        #mensaje {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="hub-grid" id="hub">
        <div id="mensaje">Cargando accesos directos...</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Promise.allSettled([
                fetch('pages.ini').then(res => res.ok ? res.text() : Promise.reject('No pages.ini')),
                fetch('pages_64.ini').then(res => res.ok ? res.text() : Promise.reject('No pages_64.ini'))
            ]).then(results => {
                let todasLasPaginas = [];

                if (results[0].status === 'fulfilled') {
                    todasLasPaginas = todasLasPaginas.concat(parseCustomINI(results[0].value, false));
                }

                if (results[1].status === 'fulfilled') {
                    todasLasPaginas = todasLasPaginas.concat(parseCustomINI(results[1].value, true));
                }

                if (todasLasPaginas.length === 0) {
                    document.getElementById('mensaje').innerText = 'No se encontraron accesos directos o no hay servidor local activo.';
                    return;
                }

                renderHub(todasLasPaginas);
            });
        });

        // Función para parsear el .ini
        function parseCustomINI(text, isBase64) {
            const lines = text.split('\n');
            const pages = [];
            let currentPage = {};

            lines.forEach(line => {
                line = line.trim();
                
                if (line === '') {
                    if (Object.keys(currentPage).length > 0) {
                        pages.push(currentPage);
                        currentPage = {};
                    }
                    return;
                }

                const separatorIndex = line.indexOf(':');
                if (separatorIndex !== -1) {
                    const key = line.substring(0, separatorIndex).trim().toLowerCase();
                    let value = line.substring(separatorIndex + 1).trim();

                    if (isBase64 && key === 'url') {
                        try {
                            value = atob(value);
                        } catch (e) {
                            console.error('Error decodificando Base64:', value);
                            value = '#';
                        }
                    }
                    currentPage[key] = value;
                }
            });

            if (Object.keys(currentPage).length > 0) {
                pages.push(currentPage);
            }

            return pages;
        }

        // Parsear coordenadas (ej. 1a, b2)
        function parseGridOrder(orderStr) {
            if (!orderStr) return null;
            
            orderStr = orderStr.trim().toLowerCase();
            const match = orderStr.match(/^([a-z]+)(\d+)$|^(\d+)([a-z]+)$/);
            if (!match) return null;

            const letters = match[1] || match[4];
            const numbers = match[2] || match[3];

            let col = 0;
            for (let i = 0; i < letters.length; i++) {
                col = col * 26 + (letters.charCodeAt(i) - 96);
            }
            
            const row = parseInt(numbers, 10);
            return { row, col };
        }

        // Función para procesar y aplicar el text-outline
        function aplicarTextOutline(elemento, outlineStr) {
            if (!outlineStr) return;
            const parts = outlineStr.trim().split(/\s+/);
            if (parts[0].toLowerCase() === 'true' && parts.length >= 3) {
                const color = parts[1];
                const size = parts[2];
                elemento.style.textShadow = `
                    -${size} -${size} 0 ${color},  
                     0px -${size} 0 ${color},  
                     ${size} -${size} 0 ${color},  
                     ${size}  0px 0 ${color},  
                     ${size}  ${size} 0 ${color},  
                     0px  ${size} 0 ${color},  
                    -${size}  ${size} 0 ${color},  
                    -${size}  0px 0 ${color}
                `;
            }
        }

        // Función para procesar y aplicar el color del texto
        function aplicarTextColor(elemento, textColorStr) {
            if (!textColorStr) return;
            const parts = textColorStr.trim().split(/\s+/);
            if (parts[0].toLowerCase() === 'true' && parts.length >= 2) {
                elemento.style.color = parts[1];
            }
        }

        // Función para aplicar un tamaño personalizado a la imagen
        function aplicarTamañoImagen(imgElement, sizeStr) {
            if (!sizeStr) return;
            
            // Separamos por la letra "x" (ignorando mayúsculas/minúsculas y espacios)
            const parts = sizeStr.toLowerCase().split('x');
            
            if (parts.length === 2) {
                let width = parts[0].trim();
                let height = parts[1].trim();
                
                // Si solo pusieron números (ej: 64), le añadimos "px" para que el CSS lo entienda
                if (/^\d+$/.test(width)) width += 'px';
                if (/^\d+$/.test(height)) height += 'px';

                imgElement.style.width = width;
                imgElement.style.height = height;
            }
        }

        // Dibuja los elementos
        function renderHub(pages) {
            const hub = document.getElementById('hub');
            hub.innerHTML = ''; 

            pages.forEach(page => {
                const a = document.createElement('a');
                a.className = 'tile';
                // Ya no usamos a.target = '_blank', por lo que cargará en la misma pestaña
                
                let url = page.url || '#';
                if (url !== '#' && !url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }
                a.href = url;

                // Asignar Color de Fondo (Ignorando explícitamente 'false')
                if (page.color && page.color.toLowerCase() !== 'false') {
                    a.style.backgroundColor = page.color;
                }

                // Asignar Posición
                const gridPos = parseGridOrder(page.order);
                if (gridPos) {
                    a.style.gridArea = `${gridPos.row} / ${gridPos.col} / ${gridPos.row + 1} / ${gridPos.col + 1}`;
                }

                // Configurar la Imagen
                const img = document.createElement('img');
                img.src = page.icon || '';
                img.alt = page.name || 'Icono';
                img.onerror = () => { img.style.display = 'none'; };
                
                // Aplicar tamaño personalizado si existe "img-size"
                if (page['img-size']) {
                    aplicarTamañoImagen(img, page['img-size']);
                }

                // Configurar el Texto
                const span = document.createElement('span');
                span.textContent = page.name || 'Sin Nombre';

                if (page['text-outline']) aplicarTextOutline(span, page['text-outline']);
                if (page['text-color']) aplicarTextColor(span, page['text-color']);

                a.appendChild(img);
                a.appendChild(span);
                hub.appendChild(a);
            });
        }
    </script>
</body>
</html>
