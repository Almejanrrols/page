<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almejanrrols Hub</title>
    <style>
        /* CSS: Estilos base */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: auto; 
        }

        /* La cuadrícula tipo Windows 8 */
        .hub-grid {
            display: grid;
            grid-auto-columns: 140px;
            grid-auto-rows: 140px;
            gap: 15px;
            grid-auto-flow: row dense; 
        }

        /* Estilo de cada "Tile" (cuadrado) */
        .tile {
            background-color: #0078D7;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease;
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .tile:hover {
            transform: scale(1.1);
            filter: brightness(0.85);
            z-index: 10;
        }

        .tile img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .tile span {
            font-size: 14px; /* Tamaño predeterminado si no se usa text-size */
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
            z-index: 2;
            line-height: 1.2;
        }

        #mensaje {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="hub-grid" id="hub">
        <div id="mensaje">Cargando accesos directos...</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('pages.ini')
                .then(response => {
                    if (!response.ok) throw new Error('No pages.ini');
                    return response.text();
                })
                .then(text => {
                    const paginas = parseHubData(text);
                    if (paginas.length === 0) {
                        document.getElementById('mensaje').innerText = 'El archivo pages.ini está vacío o no tiene el formato correcto.';
                        return;
                    }
                    renderHub(paginas);
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('mensaje').innerText = 'No se encontró pages.ini o no hay servidor local activo.';
                });
        });

        function parseHubData(text) {
            const pages = [];
            const blocks = text.match(/\{([\s\S]*?)\}/g);
            
            if (!blocks) return pages;

            blocks.forEach(block => {
                const currentPage = {};
                const content = block.replace(/^\{|\}$/g, '');
                const lines = content.split('\n');

                lines.forEach(line => {
                    line = line.trim();
                    if (line === '' || line.startsWith('//')) return;

                    const separatorIndex = line.indexOf(':');
                    if (separatorIndex !== -1) {
                        const key = line.substring(0, separatorIndex).trim().toLowerCase();
                        let value = line.substring(separatorIndex + 1).trim();

                        if (key === 'url64') {
                            try { 
                                currentPage['url'] = atob(value); 
                            } catch (e) { 
                                currentPage['url'] = '#'; 
                            }
                        } else {
                            currentPage[key] = value;
                        }
                    }
                });

                if (Object.keys(currentPage).length > 0) pages.push(currentPage);
            });

            return pages;
        }

        function parseGridOrder(orderStr) {
            if (!orderStr) return null;
            orderStr = orderStr.trim().toLowerCase();
            const match = orderStr.match(/^([a-z]+)(\d+)$|^(\d+)([a-z]+)$/);
            if (!match) return null;
            const letters = match[1] || match[4];
            const numbers = match[2] || match[3];
            let col = 0;
            for (let i = 0; i < letters.length; i++) {
                col = col * 26 + (letters.charCodeAt(i) - 96);
            }
            return { row: parseInt(numbers, 10), col };
        }

        function aplicarTextOutline(elemento, outlineStr) {
            if (!outlineStr) return;
            const parts = outlineStr.trim().split(/\s+/);
            if (parts[0].toLowerCase() === 'true' && parts.length >= 3) {
                const color = parts[1];
                const size = parts[2];
                elemento.style.textShadow = `
                    -${size} -${size} 0 ${color}, 0px -${size} 0 ${color}, ${size} -${size} 0 ${color},  
                    ${size} 0px 0 ${color}, ${size} ${size} 0 ${color}, 0px ${size} 0 ${color},  
                    -${size} ${size} 0 ${color}, -${size} 0px 0 ${color}
                `;
            }
        }

        function aplicarTextColor(elemento, textColorStr) {
            if (!textColorStr) return;
            const parts = textColorStr.trim().split(/\s+/);
            if (parts[0].toLowerCase() === 'true' && parts.length >= 2) elemento.style.color = parts[1];
        }

        function aplicarTamañoImagen(imgElement, sizeStr) {
            if (!sizeStr) return;
            const parts = sizeStr.toLowerCase().split('x');
            if (parts.length === 2) {
                let width = parts[0].trim();
                let height = parts[1].trim();
                if (/^\d+$/.test(width)) width += 'px';
                if (/^\d+$/.test(height)) height += 'px';
                imgElement.style.width = width;
                imgElement.style.height = height;
            }
        }

        function aplicarTextPlace(elemento, coordStr) {
            if (!coordStr) return;
            
            const parts = coordStr.trim().split(/\s+/);
            if (parts.length >= 2) {
                const x = parseFloat(parts[0]);
                const y = parseFloat(parts[1]);

                if (!isNaN(x) && !isNaN(y)) {
                    const clampX = Math.max(-512, Math.min(512, x));
                    const clampY = Math.max(-512, Math.min(512, y));

                    const leftPercent = 50 + ((clampX / 512) * 50);
                    const topPercent = 50 - ((clampY / 512) * 50);

                    elemento.style.position = 'absolute';
                    elemento.style.left = `${leftPercent}%`;
                    elemento.style.top = `${topPercent}%`;
                    elemento.style.transform = 'translate(-50%, -50%)';
                    elemento.style.pointerEvents = 'none'; 
                }
            }
        }

        function aplicarFuenteCustom(span, fontUrl, index) {
            if (!fontUrl || fontUrl.toLowerCase() === 'false') return;
            const fontName = 'HubFont_' + index;
            const customFont = new FontFace(fontName, `url(${fontUrl})`);
            
            customFont.load().then((loadedFont) => {
                document.fonts.add(loadedFont);
                span.style.fontFamily = fontName;
            }).catch(err => {
                console.error('Error cargando la fuente:', fontUrl, err);
            });
        }

        // NUEVO: Función para procesar y aplicar el tamaño de texto personalizado
        function aplicarTextSize(elemento, sizeStr) {
            if (!sizeStr) return;
            let size = sizeStr.trim();
            // Si es solo un número (ej. "20" o "20.5"), le añadimos 'px'
            if (/^\d+(\.\d+)?$/.test(size)) {
                size += 'px';
            }
            elemento.style.fontSize = size;
        }

        function renderHub(pages) {
            const hub = document.getElementById('hub');
            hub.innerHTML = ''; 

            pages.forEach((page, index) => {
                const a = document.createElement('a');
                a.className = 'tile';
                
                let url = page.url || '#';
                if (url !== '#' && !url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }
                a.href = url;

                if (page.color && page.color.toLowerCase() !== 'false') a.style.backgroundColor = page.color;

                const gridPos = parseGridOrder(page.order);
                if (gridPos) a.style.gridArea = `${gridPos.row} / ${gridPos.col} / ${gridPos.row + 1} / ${gridPos.col + 1}`;

                const img = document.createElement('img');
                img.src = page.icon || '';
                img.alt = page.name || 'Icono';
                img.onerror = () => { img.style.display = 'none'; };
                
                if (page['img-size']) aplicarTamañoImagen(img, page['img-size']);

                const span = document.createElement('span');
                let rawName = page.name || 'Sin Nombre';
                
                span.innerHTML = rawName.replace(/\^/g, '&nbsp;').replace(/¬/g, '<br>');

                if (page['text-outline']) aplicarTextOutline(span, page['text-outline']);
                if (page['text-color']) aplicarTextColor(span, page['text-color']);
                if (page['text-place']) aplicarTextPlace(span, page['text-place']);
                if (page['font']) aplicarFuenteCustom(span, page['font'], index);
                
                // Aplicar la nueva propiedad text-size
                if (page['text-size']) aplicarTextSize(span, page['text-size']);

                if (page['text-place']) {
                    img.style.margin = '0';
                }

                a.appendChild(img);
                a.appendChild(span);
                hub.appendChild(a);
            });
        }
    </script>
</body>
</html>
